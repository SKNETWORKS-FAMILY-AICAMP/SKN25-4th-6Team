# ═══════════════════════════════════════════
# RAIchU 프롬프트 설정
# ═══════════════════════════════════════════

# --- 모델 설정 ---
model: claude-sonnet-4-20250514
temperature: 0.7
max_tokens: 2048

# --- 온보딩 허용값 ---
age_groups:
  - "20대"
  - "30대"
  - "40대"
  - "50대 이상"

annual_fee_options:
  - "없음 선호"
  - "3만원 이하"
  - "5만원 이상도 OK"

lifestyle_tags:
  - label: "카라이프"
    icon: "🚗"
    related_benefits: ["주유", "하이패스", "세차", "자동차보험"]
  - label: "여행러"
    icon: "✈️"
    related_benefits: ["마일리지", "공항라운지", "호텔", "해외결제"]
  - label: "카페인중독"
    icon: "☕"
    related_benefits: ["카페할인", "스타벅스", "투썸", "편의점"]
  - label: "디지털노마드"
    icon: "💻"
    related_benefits: ["온라인쇼핑", "구독서비스", "통신비"]
  - label: "헬스·건강"
    icon: "🏋️"
    related_benefits: ["헬스장", "필라테스", "건강식품", "병원"]
  - label: "가족중심"
    icon: "👨‍👩‍👧"
    related_benefits: ["교육", "유아용품", "대형마트", "놀이공원"]
  - label: "배달·외식"
    icon: "🍜"
    related_benefits: ["배달의민족", "쿠팡이츠", "요기요", "외식"]
  - label: "문화생활"
    icon: "🎬"
    related_benefits: ["영화", "OTT", "공연", "도서"]
  - label: "쇼핑"
    icon: "🛍️"
    related_benefits: ["백화점", "아울렛", "온라인쇼핑몰", "면세점"]

spend_tiers:
  - label: "30만원 미만"
    strategy: "전월실적 조건이 낮거나 없는 카드 위주"
  - label: "30~70만원"
    strategy: "실적 조건 30~50만원 카드 적합"
  - label: "70~150만원"
    strategy: "중상위 실적 카드, 혜택 폭 넓음"
  - label: "150만원 이상"
    strategy: "프리미엄 카드 포함, 최대 혜택률 카드"

benefit_types:
  - "즉시할인"
  - "포인트적립"
  - "마일리지"
  - "캐시백"

# --- 의도 분류 ---
intents:
  card_recommend:
    description: "카드 추천 요청"
    template: "instructions/card_recommend.j2"
  benefit_compare:
    description: "혜택 비교 요청"
    template: "instructions/benefit_compare.j2"
  general:
    description: "일반 대화 / 카드 관련 질문"
    template: "instructions/general_chat.j2"
