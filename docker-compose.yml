services:
  backend:
    build:
      context: .                      # 프로젝트 루트 (src/, config/ 포함)
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/project/data          # 카드 데이터 (빌드 제외, 런타임 마운트)
      - ./vector_store:/project/vector_store  # 벡터 인덱스
    env_file:
      - ./backend/.env
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
